name: Preflight CI Gate

on:
  push:
    branches:
      - main

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  HUME_API_KEY: ${{ secrets.HUME_API_KEY }}
  HUME_API_KEY2: ${{ secrets.HUME_API_KEY2 }}
  HUME_API_KEY3: ${{ secrets.HUME_API_KEY3 }}
  HUME_API_KEY4: ${{ secrets.HUME_API_KEY4 }}
  HUME_API_KEY5: ${{ secrets.HUME_API_KEY5 }}
  HUME_VOICE_ID: ${{ secrets.HUME_VOICE_ID }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
  YOUTUBE_TOKEN_BASE64: ${{ secrets.YOUTUBE_TOKEN_BASE64 }}

jobs:
  run-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'remotion/package-lock.json'

      - name: Install NPM dependencies
        working-directory: remotion
        run: npm install

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Preflight Check
        run: python scripts/preflight_check.py --skip-youtube-live
