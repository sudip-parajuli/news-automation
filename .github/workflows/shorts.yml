name: Shorts Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic for the video"
        required: false
        type: string
  schedule:
    - cron: "0 17 * * 1-5" # Mon-Fri 17:00 UTC
    - cron: "0 15 * * 6,0" # Sat-Sun 15:00 UTC

env:
  USE_REMOTION_SHORTS: "true"
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
  GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
  GEMINI_API_KEY4: ${{ secrets.GEMINI_API_KEY4 }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
  GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
  GROQ_API_KEY4: ${{ secrets.GROQ_API_KEY4 }}
  HUME_API_KEY: ${{ secrets.HUME_API_KEY }}
  HUME_API_KEY2: ${{ secrets.HUME_API_KEY2 }}
  HUME_API_KEY3: ${{ secrets.HUME_API_KEY3 }}
  HUME_API_KEY4: ${{ secrets.HUME_API_KEY4 }}
  HUME_API_KEY5: ${{ secrets.HUME_API_KEY5 }}
  HUME_API_KEY6: ${{ secrets.HUME_API_KEY6 }}
  HUME_API_KEY7: ${{ secrets.HUME_API_KEY7 }}
  HUME_API_KEY8: ${{ secrets.HUME_API_KEY8 }}
  HUME_API_KEY9: ${{ secrets.HUME_API_KEY9 }}
  HUME_API_KEY10: ${{ secrets.HUME_API_KEY10 }}
  HUME_VOICE_ID: ${{ secrets.HUME_VOICE_ID }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
  YOUTUBE_TOKEN_BASE64: ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
  TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
  TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}

jobs:
  run-shorts-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'remotion/package-lock.json'

      - name: Install NPM dependencies
        working-directory: remotion
        run: npm install

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Preflight Check
        run: python scripts/preflight_check.py

      - name: Run Shorts Pipeline
        run: |
          if [ "$USE_REMOTION_SHORTS" = "true" ]; then
            echo "Running Remotion Shorts pipeline"
            python scripts/shorts_pipeline.py || python main_breaking.py
          else
            echo "Running legacy breaking news pipeline (MoviePy)"
            python main_breaking.py
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-pipeline-output-${{ github.run_id }}
          path: |
            output/videos/
            output/pipeline_state/
            output/dry_run_upload_*.json
          retention-days: 7
