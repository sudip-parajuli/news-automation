name: Long-form Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic for the video"
        required: true
        type: string
  schedule:
    - cron: "0 22 * * 2,4" # Tue/Thu 22:00 UTC

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  HUME_API_KEY: ${{ secrets.HUME_API_KEY }}
  HUME_API_KEY2: ${{ secrets.HUME_API_KEY2 }}
  HUME_API_KEY3: ${{ secrets.HUME_API_KEY3 }}
  HUME_API_KEY4: ${{ secrets.HUME_API_KEY4 }}
  HUME_API_KEY5: ${{ secrets.HUME_API_KEY5 }}
  HUME_VOICE_ID: ${{ secrets.HUME_VOICE_ID }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
  YOUTUBE_TOKEN_BASE64: ${{ secrets.YOUTUBE_TOKEN_BASE64 }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'remotion/package-lock.json'

      - name: Install NPM dependencies
        working-directory: remotion
        run: npm install

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Preflight Check
        run: python scripts/preflight_check.py

      - name: Run Pipeline (Manual)
        if: github.event_name == 'workflow_dispatch'
        run: python run_longform.py "${{ github.event.inputs.topic }}"

      - name: Run Pipeline (Scheduled)
        if: github.event_name == 'schedule'
        run: python daily_run.py

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: |
            output/videos/
            output/pipeline_state/
            output/thumbnails/
            output/dry_run_upload_*.json
          retention-days: 7
